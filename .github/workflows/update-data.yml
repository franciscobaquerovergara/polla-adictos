name: Update Polla Data

on:
  schedule:
    # Every 30 minutes between 6am and midnight UTC (11pm-7am Colombia)
    - cron: '*/30 9-5 * * *'
  workflow_dispatch:   # Allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scraper/scrape.js
        env:
          POLLAYA_EMAIL: ${{ secrets.POLLAYA_EMAIL }}
          POLLAYA_PASSWORD: ${{ secrets.POLLAYA_PASSWORD }}

      - name: Commit updated data if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet data.json || (
            git add data.json &&
            git commit -m "chore: update polla data $(date -u +'%Y-%m-%d %H:%M UTC')"
          )

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
